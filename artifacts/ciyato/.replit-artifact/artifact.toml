kind = "web"
previewPath = "/"
title = "Ciyato — AI Phone Organizer"
version = "1.0.0"
id = "artifacts/ciyato"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21997

[services.development]
run = "pnpm --filter @workspace/ciyato run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ciyato", "run", "build" ]
publicDir = "artifacts/ciyato/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21997"
BASE_PATH = "/"
